<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WingLoop Lite - Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wght@0,100..900;1,100..900&amp;family=Montserrat:ital,wght@0,100..900;1,100..900&amp;family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom slider styles to match arcade theme */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #7df4ff; /* primary-fixed */
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 10px rgba(125, 244, 255, 0.8);
            border: 2px solid #002022; /* on-primary-fixed */
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #3b494b; /* outline-variant */
            border-radius: 2px;
        }
        input[type=range]:focus {
            outline: none;
        }
        
        /* Glow animations */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(125, 244, 255, 0.5); }
            50% { box-shadow: 0 0 15px rgba(125, 244, 255, 0.8); }
            100% { box-shadow: 0 0 5px rgba(125, 244, 255, 0.5); }
        }
        .neon-glow-primary {
            box-shadow: 0 0 12px rgba(125, 244, 255, 0.6);
        }
        .neon-glow-primary-hover:hover {
            animation: pulse-glow 1.5s infinite;
        }
        
        /* Scanline effect for background */
        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error": "#690005",
                    "on-primary-container": "#006970",
                    "tertiary-fixed-dim": "#ffb59c",
                    "secondary-fixed": "#79ff5b",
                    "primary-container": "#00f0ff",
                    "on-primary-fixed": "#002022",
                    "on-secondary-container": "#0f6d00",
                    "on-tertiary-fixed": "#390c00",
                    "surface-container-highest": "#2d3449",
                    "surface-container-high": "#222a3d",
                    "on-tertiary-fixed-variant": "#832700",
                    "on-error-container": "#ffdad6",
                    "surface-container-low": "#131b2e",
                    "on-primary": "#00363a",
                    "outline": "#849495",
                    "on-secondary-fixed": "#022100",
                    "on-tertiary": "#5c1900",
                    "surface-dim": "#0b1326",
                    "surface-tint": "#00dbe9",
                    "on-secondary-fixed-variant": "#095300",
                    "secondary-fixed-dim": "#2ae500",
                    "surface-container": "#171f33",
                    "primary-fixed": "#7df4ff",
                    "on-surface": "#dae2fd",
                    "error": "#ffb4ab",
                    "tertiary-container": "#ffcfc0",
                    "surface": "#0b1326",
                    "secondary-container": "#2ff801",
                    "background": "#0b1326",
                    "secondary": "#d7ffc5",
                    "on-tertiary-container": "#ac3600",
                    "tertiary-fixed": "#ffdbcf",
                    "outline-variant": "#3b494b",
                    "on-secondary": "#053900",
                    "primary-fixed-dim": "#00dbe9",
                    "error-container": "#93000a",
                    "inverse-primary": "#006970",
                    "surface-bright": "#31394d",
                    "on-background": "#dae2fd",
                    "surface-container-lowest": "#060e20",
                    "inverse-on-surface": "#283044",
                    "on-primary-fixed-variant": "#004f54",
                    "surface-variant": "#2d3449",
                    "primary": "#dbfcff",
                    "tertiary": "#fff4f0",
                    "on-surface-variant": "#b9cacb",
                    "inverse-surface": "#dae2fd"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "unit": "8px",
                    "container-margin": "24px",
                    "safe-area-bottom": "40px"
            },
            "fontFamily": {
                    "title-md": [
                            "Montserrat"
                    ],
                    "headline-lg": [
                            "Anybody"
                    ],
                    "headline-lg-mobile": [
                            "Anybody"
                    ],
                    "display-score": [
                            "Anybody"
                    ],
                    "body-md": [
                            "Montserrat"
                    ],
                    "label-mono": [
                            "Space Mono"
                    ]
            },
            "fontSize": {
                    "title-md": [
                            "20px",
                            {
                                    "lineHeight": "28px",
                                    "fontWeight": "700"
                            }
                    ],
                    "headline-lg": [
                            "48px",
                            {
                                    "lineHeight": "56px",
                                    "letterSpacing": "0.02em",
                                    "fontWeight": "800"
                            }
                    ],
                    "headline-lg-mobile": [
                            "32px",
                            {
                                    "lineHeight": "40px",
                                    "fontWeight": "800"
                            }
                    ],
                    "display-score": [
                            "72px",
                            {
                                    "lineHeight": "80px",
                                    "letterSpacing": "-0.04em",
                                    "fontWeight": "900"
                            }
                    ],
                    "body-md": [
                            "16px",
                            {
                                    "lineHeight": "24px",
                                    "fontWeight": "400"
                            }
                    ],
                    "label-mono": [
                            "14px",
                            {
                                    "lineHeight": "20px",
                                    "letterSpacing": "0.1em",
                                    "fontWeight": "700"
                            }
                    ]
            }
        },
        },
      }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen relative overflow-hidden flex items-center justify-center">
<!-- Faux Gameplay Background (Simulating context) -->
<div class="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&amp;w=2070&amp;auto=format&amp;fit=crop')] bg-cover bg-center opacity-30" data-alt="A dark, retro-futuristic arcade game background featuring a neon grid landscape fading into a starry horizon. The scene is illuminated by glowing electric blue and neon green accents, creating a high-velocity, side-scroller atmosphere. The lighting is moody and dramatic, reminiscent of 80s synthwave aesthetics. The overall style is clean, sharp, and highly energetic, perfect for a high-contrast modern arcade UI."></div>
<div class="absolute inset-0 z-0 scanlines pointer-events-none opacity-50"></div>
<!-- Gameplay HUD Elements (Visible but blurred out) -->
<div class="absolute top-0 left-0 w-full p-container-margin flex justify-between z-10 opacity-40 blur-sm pointer-events-none">
<div class="font-display-score text-display-score text-primary-fixed">042</div>
<div class="flex gap-4">
<div class="w-12 h-12 rounded-full border-2 border-primary-fixed bg-surface/50 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-fixed">pause</span>
</div>
</div>
</div>
<!-- Navigation Shells (Hidden per intent rule, but structurally present) -->
<nav class="hidden md:flex fixed top-0 w-full bg-transparent flex justify-between items-center px-6 py-4 z-50 pointer-events-none opacity-0">
<div class="font-headline-lg-mobile text-headline-lg-mobile italic tracking-tighter text-primary-fixed-dim drop-shadow-[0_0_10px_rgba(0,219,233,0.8)]">WingLoop Lite</div>
</nav>
<!-- SideNavBar (Suppressed for focused settings overlay) -->
<nav class="hidden fixed left-0 top-0 h-full w-64 border-r-2 border-primary-fixed-dim/30 bg-surface-container-highest/60 backdrop-blur-md flex flex-col py-8 gap-6 z-40 opacity-0 pointer-events-none"></nav>
<!-- Main Settings Overlay -->
<main class="relative z-20 w-full max-w-[480px] px-container-margin py-8">
<!-- Settings Card -->
<div class="bg-surface-container-highest/80 backdrop-blur-xl border-2 border-primary-fixed-dim/30 rounded-xl shadow-[0_0_30px_rgba(0,219,233,0.15)] flex flex-col overflow-hidden">
<!-- Header -->
<div class="px-6 py-4 border-b-2 border-outline-variant flex justify-between items-center bg-surface-container-low/50">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary-fixed-dim tracking-tighter italic uppercase">Settings</h1>
<button aria-label="Close settings" class="text-on-surface-variant hover:text-primary-fixed transition-colors">
<span class="material-symbols-outlined" style="font-size: 28px;">close</span>
</button>
</div>
<!-- Content Area -->
<div class="p-6 flex flex-col gap-8">
<!-- Section: Difficulty/Speed -->
<div class="flex flex-col gap-4">
<div class="flex items-center gap-2 text-primary-fixed">
<span class="material-symbols-outlined">speed</span>
<h2 class="font-title-md text-title-md uppercase tracking-wider">Flight Speed</h2>
</div>
<div class="bg-surface-container/50 p-4 rounded-lg border border-outline-variant">
<div class="flex justify-between mb-4 px-2">
<span class="font-label-mono text-label-mono text-on-surface-variant">SLOW</span>
<span class="font-label-mono text-label-mono text-secondary-fixed">NORMAL</span>
<span class="font-label-mono text-label-mono text-on-surface-variant">FAST</span>
</div>
<div class="px-2">
<input class="w-full" id="speed-slider" max="3" min="1" type="range" value="2"/>
</div>
</div>
</div>
<!-- Section: Input Help -->
<div class="flex flex-col gap-4">
<div class="flex items-center gap-2 text-primary-fixed">
<span class="material-symbols-outlined">sports_esports</span>
<h2 class="font-title-md text-title-md uppercase tracking-wider">Controls</h2>
</div>
<div class="grid grid-cols-3 gap-3">
<!-- Key -->
<div class="bg-surface-container p-3 rounded-lg border border-outline-variant flex flex-col items-center justify-center gap-2">
<div class="w-12 h-12 rounded bg-surface border-b-4 border-primary-fixed-dim flex items-center justify-center text-primary-fixed">
<span class="material-symbols-outlined">space_bar</span>
</div>
<span class="font-label-mono text-label-mono text-[10px] text-on-surface-variant">SPACE</span>
</div>
<!-- Click -->
<div class="bg-surface-container p-3 rounded-lg border border-outline-variant flex flex-col items-center justify-center gap-2">
<div class="w-12 h-12 rounded-full bg-surface border-2 border-primary-fixed-dim flex items-center justify-center text-primary-fixed">
<span class="material-symbols-outlined">mouse</span>
</div>
<span class="font-label-mono text-label-mono text-[10px] text-on-surface-variant">CLICK</span>
</div>
<!-- Touch -->
<div class="bg-surface-container p-3 rounded-lg border border-outline-variant flex flex-col items-center justify-center gap-2">
<div class="w-12 h-12 rounded-lg bg-surface border-2 border-primary-fixed-dim flex items-center justify-center text-primary-fixed">
<span class="material-symbols-outlined">touch_app</span>
</div>
<span class="font-label-mono text-label-mono text-[10px] text-on-surface-variant">TAP</span>
</div>
</div>
<p class="font-body-md text-body-md text-center text-on-surface-variant mt-2">Activate controls to boost altitude.</p>
</div>
<!-- Section: Audio (Bonus common setting for arcade) -->
<div class="flex flex-col gap-4">
<div class="flex items-center gap-2 text-primary-fixed">
<span class="material-symbols-outlined">volume_up</span>
<h2 class="font-title-md text-title-md uppercase tracking-wider">Audio</h2>
</div>
<div class="flex gap-4">
<button class="flex-1 bg-surface-container border border-primary-fixed-dim/50 py-3 rounded-lg flex items-center justify-center gap-2 text-primary-fixed hover:bg-primary-fixed-dim/10 transition-colors">
<span class="material-symbols-outlined">music_note</span>
<span class="font-label-mono text-label-mono">MUSIC ON</span>
</button>
<button class="flex-1 bg-surface-container border border-primary-fixed-dim/50 py-3 rounded-lg flex items-center justify-center gap-2 text-primary-fixed hover:bg-primary-fixed-dim/10 transition-colors">
<span class="material-symbols-outlined">campaign</span>
<span class="font-label-mono text-label-mono">SFX ON</span>
</button>
</div>
</div>
</div>
<!-- Footer Actions -->
<div class="p-6 bg-surface-container-low/80 border-t-2 border-outline-variant flex flex-col gap-4">
<button class="w-full bg-primary-fixed text-on-primary-fixed font-title-md text-title-md py-4 rounded-lg uppercase tracking-widest border-b-4 border-[#00a8b3] neon-glow-primary neon-glow-primary-hover active:translate-y-1 active:border-b-0 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                    SAVE PREFERENCES
                </button>
<div class="flex justify-between items-center mt-2">
<button class="text-on-surface-variant hover:text-error transition-colors font-label-mono text-label-mono flex items-center gap-1 text-[12px] opacity-70 hover:opacity-100">
<span class="material-symbols-outlined" style="font-size: 16px;">restart_alt</span>
                        RESET DEFAULTS
                    </button>
<button class="text-on-surface-variant hover:text-primary-fixed transition-colors font-label-mono text-label-mono flex items-center gap-1">
                        RESUME GAME <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</div>
</div>
</div>
</main>
<script>
        // Simple slider interaction logic to update colors
        const slider = document.getElementById('speed-slider');
        const labels = slider.parentElement.previousElementSibling.querySelectorAll('span');
        
        slider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            labels.forEach((label, index) => {
                if(index === val - 1) {
                    label.classList.remove('text-on-surface-variant');
                    label.classList.add('text-secondary-fixed');
                } else {
                    label.classList.remove('text-secondary-fixed');
                    label.classList.add('text-on-surface-variant');
                }
            });
        });
    </script>
</body></html>
